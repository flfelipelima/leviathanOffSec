# Leviathan tmux config
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g base-index 1
set -g history-limit 50000
set -g mouse on
set -sg escape-time 0

# Prefix: Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-like navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Status — Leviathan theme
set -g status-style 'bg=#141414 fg=#ff5064'
set -g status-left '#[fg=#ff5064,bold] ▶ #S '
set -g status-right '#[fg=#5a5a5a] %H:%M #[fg=#ff5064]%d/%m/%Y '
set -g window-status-current-style 'fg=#ff5064,bold'
set -g pane-border-style 'fg=#3a3a3a'
set -g pane-active-border-style 'fg=#ff5064'
set -g message-style 'bg=#141414 fg=#ff5064'
